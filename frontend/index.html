<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kurzy a události</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .hero { padding: 48px 0 28px; }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
    .filter-btn {
      padding: 8px 20px;
      border: 1.5px solid var(--gray-300);
      background: #fff;
      border-radius: 20px;
      font-size: .875rem;
      cursor: pointer;
      transition: all .2s;
      color: var(--gray-600);
      font-family: inherit;
    }
    .filter-btn:hover  { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding-bottom: 48px;
    }

    .course-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      display: flex;
      flex-direction: column;
      transition: transform .2s, box-shadow .2s;
    }
    .course-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }

    .course-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 10px 0 8px;
      color: var(--text);
      line-height: 1.3;
    }
    .course-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
      font-size: .83rem;
      color: var(--gray-600);
    }
    .course-meta span { display: flex; align-items: center; gap: 4px; }
    .course-desc {
      font-size: .9rem;
      color: var(--gray-600);
      flex: 1;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .course-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--gray-100);
    }
    .course-price { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
  </style>
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="/" class="header-logo">Planner</a>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1 class="page-title">Kurzy a události</h1>
      <p class="page-subtitle">Vyberte si kurz a přihlaste se online.</p>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Všechny</button>
        <button class="filter-btn" data-filter="jednorázový">Jednorázové</button>
        <button class="filter-btn" data-filter="pravidelný">Pravidelné</button>
      </div>
    </div>
  </section>

  <div class="container">
    <div id="loading" style="text-align:center;padding:48px 0;">
      <span class="spinner"></span>
    </div>
    <div id="error" class="alert alert-error" style="display:none;max-width:480px;"></div>
    <div id="courses-grid" class="courses-grid" style="display:none;"></div>
    <div id="empty" class="empty-state" style="display:none;">
      Žádné kurzy odpovídající filtru.
    </div>
  </div>

  <script>
    let allCourses = [];
    let activeFilter = 'all';

    async function loadCourses() {
      try {
        const res = await fetch('/api/courses');
        if (!res.ok) throw new Error();
        allCourses = await res.json();
        render();
      } catch {
        document.getElementById('loading').style.display = 'none';
        const el = document.getElementById('error');
        el.textContent = 'Nepodařilo se načíst kurzy. Zkuste obnovit stránku.';
        el.style.display = 'block';
      }
    }

    function render() {
      const loading = document.getElementById('loading');
      const grid    = document.getElementById('courses-grid');
      const empty   = document.getElementById('empty');

      loading.style.display = 'none';

      const list = activeFilter === 'all'
        ? allCourses
        : allCourses.filter(c => c.type === activeFilter);

      if (list.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      grid.style.display  = 'grid';

      grid.innerHTML = list.map(c => {
        const reg   = c.registered_count || 0;
        const fill  = c.capacity > 0 ? Math.min(100, Math.round(reg / c.capacity * 100)) : 0;
        const cls   = fill >= 100 ? 'full' : fill >= 80 ? 'near' : '';
        const isFull = reg >= c.capacity;
        return `
          <article class="course-card">
            <div>
              <span class="badge ${c.type === 'pravidelný' ? 'badge-green' : 'badge-blue'}">${esc(c.type)}</span>
            </div>
            <h2 class="course-name">${esc(c.name)}</h2>
            <div class="course-meta">
              <span>📅 ${fmtDate(c.date)}</span>
              <span>🕐 ${esc(c.time)}</span>
              <span>📍 ${esc(c.location)}</span>
            </div>
            <p class="course-desc">${esc(c.description)}</p>
            <div style="margin-bottom:16px;">
              <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--gray-400);margin-bottom:4px;">
                <span>Obsazenost</span>
                <span>${reg}&nbsp;/&nbsp;${c.capacity}</span>
              </div>
              <div class="capacity-bar">
                <div class="capacity-fill ${cls}" style="width:${fill}%"></div>
              </div>
            </div>
            <div class="course-footer">
              <span class="course-price">
                ${c.price > 0 ? c.price.toLocaleString('cs-CZ') + '&nbsp;Kč' : 'Zdarma'}
              </span>
              ${isFull
                ? '<span class="badge badge-red">Plně obsazeno</span>'
                : `<a href="/kurz/${c.id}" class="btn btn-primary btn-sm">Přihlásit se</a>`
              }
            </div>
          </article>
        `;
      }).join('');
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtDate(d) {
      if (!d) return '';
      const [y,m,day] = d.split('-');
      return `${day}.${m}.${y}`;
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    loadCourses();
  </script>

</body>
</html>
