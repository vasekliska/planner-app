services:
  - type: web
    name: planner
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: planner-db
          property: connectionString
      - key: ADMIN_TOKEN
        sync: false        # nastavte ručně v Render dashboardu
      - key: BANK_ACCOUNT
        sync: false        # nastavte ručně v Render dashboardu

databases:
  - name: planner-db
    databaseName: planner
    plan: free
